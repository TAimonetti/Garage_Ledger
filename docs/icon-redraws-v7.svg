<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
  <defs>
    <style>
      .bg { fill: #f3efe7; }
      .panel { fill: #fcfaf6; stroke: #d7cec2; stroke-width: 2; }
      .tile { fill: #fffdf9; stroke: #ddd4c8; stroke-width: 1.5; }
      .title { font: 700 38px "Segoe UI", Arial, sans-serif; fill: #2d2418; }
      .subtitle { font: 500 20px "Segoe UI", Arial, sans-serif; fill: #6c604e; }
      .label { font: 700 24px "Segoe UI", Arial, sans-serif; fill: #2f271a; }
      .meta { font: 500 18px "Segoe UI", Arial, sans-serif; fill: #726654; }
      .green { fill: #5aa45d; }
      .white { fill: #ffffff; }
      .steel { fill: #778a98; }
      .steel-dark { fill: #556774; }
    </style>

    <mask id="service-mask">
      <rect x="0" y="0" width="540" height="520" fill="black"/>
      <circle cx="128" cy="356" r="78" fill="white"/>
      <rect x="140" y="286" width="410" height="116" rx="58" fill="white" transform="rotate(-45 140 286)"/>
      <circle cx="350" cy="168" r="118" fill="white"/>
      <circle cx="144" cy="392" r="22" fill="black"/>
      <circle cx="420" cy="170" r="90" fill="black"/>
      <path d="M421 92 L562 18 L542 156 L485 184 Z" fill="black"/>
      <path d="M346 230 C386 266 442 282 512 282 L542 282 L520 320 L438 320 C392 320 344 298 306 262 Z" fill="white"/>
    </mask>

    <mask id="gear-mask">
      <rect x="0" y="0" width="540" height="520" fill="black"/>
      <circle cx="270" cy="242" r="128" fill="white"/>
      <rect x="228" y="42" width="84" height="400" rx="14" fill="white"/>
      <rect x="228" y="42" width="84" height="400" rx="14" fill="white" transform="rotate(60 270 242)"/>
      <rect x="228" y="42" width="84" height="400" rx="14" fill="white" transform="rotate(120 270 242)"/>
    </mask>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="820"/>
  <rect class="panel" x="24" y="24" width="1352" height="772" rx="30"/>

  <text class="title" x="60" y="86">Closer aCar-Inspired Service and Parts</text>
  <text class="subtitle" x="60" y="120">Rebuilt from the traced aCar silhouettes: simpler wrench, correct 6-tooth settings gear.</text>

  <g transform="translate(86 170)">
    <rect class="tile" width="560" height="560" rx="28"/>
    <circle cx="92" cy="74" r="34" class="green"/>
    <rect x="85" y="50" width="14" height="48" rx="6" class="white"/>
    <rect x="68" y="67" width="48" height="14" rx="6" class="white"/>
    <rect x="0" y="0" width="540" height="520" class="steel" mask="url(#service-mask)" transform="translate(10 36)"/>
    <text class="label" x="34" y="500">Service</text>
    <text class="meta" x="34" y="530">Closer to aCar: rounder handle, cleaner jaw, same diagonal stance.</text>
  </g>

  <g transform="translate(750 170)">
    <rect class="tile" width="560" height="560" rx="28"/>
    <rect x="0" y="0" width="540" height="520" class="steel" mask="url(#gear-mask)" transform="translate(10 36)"/>
    <circle cx="280" cy="278" r="94" class="steel-dark"/>
    <circle cx="280" cy="278" r="38" class="white"/>
    <text class="label" x="34" y="500">Parts</text>
    <text class="meta" x="34" y="530">Uses the actual aCar-style settings gear layout instead of the tire idea.</text>
  </g>
</svg>
