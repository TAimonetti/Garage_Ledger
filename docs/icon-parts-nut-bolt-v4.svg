      <rect class="metal-dark" x="202" y="156" width="132" height="46" rx="18"/>
      <path class="highlight" d="M112 158 C132 147 158 146 183 154"/>
      <path class="highlight" d="M211 163 C243 155 283 155 324 165"/>
      <g>
        <line class="thread" x1="223" y1="159" x2="223" y2="199"/>
        <line class="thread" x1="238" y1="159" x2="238" y2="199"/>
        <line class="thread" x1="253" y1="159" x2="253" y2="199"/>
        <line class="thread" x1="268" y1="159" x2="268" y2="199"/>
        <line class="thread" x1="283" y1="159" x2="283" y2="199"/>
        <line class="thread" x1="298" y1="159" x2="298" y2="199"/>
