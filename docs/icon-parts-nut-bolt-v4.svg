      <ellipse cx="55" cy="46" rx="29" ry="24" fill="#fbfdfe" stroke="#313844" stroke-width="5"/>
      <path class="highlight" d="M11 18 C30 12 76 12 98 18"/>
      <path class="inner-thread" d="M33 28 C42 21 67 21 77 28"/>
      <path class="inner-thread" d="M30 39 C41 31 68 31 80 39"/>
      <path class="inner-thread" d="M29 49 C41 41 69 41 81 49"/>
      <path class="inner-thread" d="M30 59 C42 51 68 51 80 59"/>
      <path class="inner-thread" d="M33 69 C43 62 67 62 77 69"/>
    </g>

    <text class="label" x="28" y="348">A. Straight Closest Match</text>
    <text class="note" x="28" y="384">Most directly follows your sample image.</text>
  </g>

