<svg xmlns="http://www.w3.org/2000/svg" width="1420" height="920" viewBox="0 0 1420 920">
  <defs>
    <style>
      .bg { fill: #f3efe7; }
      .panel { fill: #fcfaf6; stroke: #d5cdc1; stroke-width: 2; }
      .tile { fill: #fffdf9; stroke: #ded5c9; stroke-width: 1.5; }
      .title { font: 700 42px "Segoe UI", Arial, sans-serif; fill: #2c2418; }
      .subtitle { font: 500 20px "Segoe UI", Arial, sans-serif; fill: #6b5e4d; }
      .label { font: 700 25px "Segoe UI", Arial, sans-serif; fill: #2f271b; }
      .note { font: 500 18px "Segoe UI", Arial, sans-serif; fill: #746755; }
      .metal { fill: #b8d8e4; stroke: #313844; stroke-width: 6; stroke-linejoin: round; stroke-linecap: round; }
      .metal-dark { fill: #9ec5d3; stroke: #313844; stroke-width: 6; stroke-linejoin: round; stroke-linecap: round; }
      .thread { stroke: #313844; stroke-width: 4; stroke-linecap: round; fill: none; }
      .inner-thread { stroke: #4d5760; stroke-width: 3; stroke-linecap: round; fill: none; opacity: .9; }
      .highlight { stroke: rgba(255,255,255,.55); stroke-width: 4; stroke-linecap: round; fill: none; }
      .shadow { fill: #d4c9bb; opacity: .3; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1420" height="920"/>
  <rect class="panel" x="24" y="24" width="1372" height="872" rx="30"/>

  <text class="title" x="60" y="88">Parts Icon Concepts: Reference-Aligned Nut + Bolt</text>
  <text class="subtitle" x="60" y="124">Closer to your sample: dark outline, pale blue metal, visible threads, and a real hardware illustration feel.</text>

  <!-- Variant A -->
