<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1040" viewBox="0 0 1440 1040">
  <defs>
    <style>
      .bg { fill: #f3efe7; }
      .panel { fill: #fcfaf6; stroke: #d5cdc1; stroke-width: 2; }
      .tile { fill: #fffdf9; stroke: #ded5c9; stroke-width: 1.5; }
      .title { font: 700 42px "Segoe UI", Arial, sans-serif; fill: #2c2418; }
      .subtitle { font: 500 20px "Segoe UI", Arial, sans-serif; fill: #6b5e4d; }
      .label { font: 700 25px "Segoe UI", Arial, sans-serif; fill: #2f271b; }
      .note { font: 500 17px "Segoe UI", Arial, sans-serif; fill: #746755; }
      .shadow { fill: #cabfaa; opacity: .38; }
      .thread { stroke-linecap: round; }
      .metal-outline { stroke: #5a6670; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .facet-line { stroke: #7a8790; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; fill: none; opacity: .9; }
      .shine { fill: rgba(255,255,255,.55); }
    </style>
    <linearGradient id="steelLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbfd"/>
      <stop offset="25%" stop-color="#dde4ea"/>
      <stop offset="55%" stop-color="#a8b3bc"/>
      <stop offset="100%" stop-color="#eef3f6"/>
    </linearGradient>
    <linearGradient id="steelDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d3dbe1"/>
      <stop offset="45%" stop-color="#8c98a2"/>
      <stop offset="100%" stop-color="#6d7780"/>
    </linearGradient>
    <linearGradient id="blueBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#77b5f2"/>
      <stop offset="35%" stop-color="#4d88c6"/>
      <stop offset="100%" stop-color="#2f5e96"/>
    </linearGradient>
    <linearGradient id="goldBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fee28b"/>
      <stop offset="35%" stop-color="#e0b53a"/>
      <stop offset="100%" stop-color="#b67f18"/>
    </linearGradient>
    <linearGradient id="redBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f19b7e"/>
      <stop offset="35%" stop-color="#d75b38"/>
      <stop offset="100%" stop-color="#a43c25"/>
    </linearGradient>
    <linearGradient id="greenBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8fd07f"/>
      <stop offset="35%" stop-color="#5ca54a"/>
      <stop offset="100%" stop-color="#376f2f"/>
    </linearGradient>
  </defs>

  <rect class="bg" x="0" y="0" width="1440" height="1040"/>
  <rect class="panel" x="24" y="24" width="1392" height="992" rx="30"/>

  <text class="title" x="60" y="88">Parts Icon Concepts: Nut + Bolt, Detailed Pass</text>
  <text class="subtitle" x="60" y="124">Richer metal shading, more thread detail, fuller overlap, and a closer console-illustration feel.</text>

  <!-- Variant A -->
  <g transform="translate(60 180)">
    <rect class="tile" width="300" height="320" rx="24"/>
    <ellipse class="shadow" cx="152" cy="178" rx="94" ry="28"/>
    <g transform="rotate(-26 152 150)">
      <polygon points="70,126 103,107 103,175 70,156" fill="#9ed0ff" stroke="#315c90" stroke-width="6" stroke-linejoin="round"/>
      <polygon points="103,112 120,100 143,100 160,112 160,170 143,182 120,182 103,170" fill="url(#blueBody)" stroke="#315c90" stroke-width="6" stroke-linejoin="round"/>
      <rect x="160" y="116" width="90" height="50" rx="20" fill="url(#blueBody)" stroke="#315c90" stroke-width="6"/>
      <path d="M110 118 L150 118" class="facet-line"/>
      <path d="M110 163 L150 163" class="facet-line"/>
      <path d="M124 108 L124 174" class="facet-line"/>
      <path d="M140 108 L140 174" class="facet-line"/>
      <g stroke="#2e5687" stroke-width="4" class="thread">
        <line x1="175" y1="121" x2="175" y2="161"/>
        <line x1="189" y1="121" x2="189" y2="161"/>
        <line x1="203" y1="121" x2="203" y2="161"/>
        <line x1="217" y1="121" x2="217" y2="161"/>
        <line x1="231" y1="121" x2="231" y2="161"/>
      </g>
      <path d="M106 118 C126 109 139 108 154 111" stroke="rgba(255,255,255,.55)" stroke-width="5" fill="none" stroke-linecap="round"/>
      <path d="M168 126 C197 118 221 118 242 124" stroke="rgba(255,255,255,.45)" stroke-width="5" fill="none" stroke-linecap="round"/>
    </g>
    <g transform="translate(155 128)">
      <polygon points="0,34 20,0 70,0 90,34 70,68 20,68" fill="url(#steelLight)" stroke="#5c6871" stroke-width="7" stroke-linejoin="round"/>
      <polygon points="28,34 40,15 50,15 62,34 50,53 40,53" fill="#fffdf9" stroke="#7a8790" stroke-width="4" stroke-linejoin="round"/>
      <path d="M7 15 L82 15" class="facet-line"/>
      <path d="M7 53 L82 53" class="facet-line"/>
      <path d="M18 4 L35 34 L18 64" class="facet-line"/>
      <path d="M72 4 L55 34 L72 64" class="facet-line"/>
    </g>
    <ellipse cx="192" cy="117" rx="30" ry="10" fill="rgba(255,255,255,.45)"/>
    <text class="label" x="28" y="264">A. Blue Service Hardware</text>
    <text class="note" x="28" y="294">Closer to the old colorful console feel.</text>
  </g>

  <!-- Variant B -->
  <g transform="translate(390 180)">
    <rect class="tile" width="300" height="320" rx="24"/>
    <ellipse class="shadow" cx="148" cy="184" rx="92" ry="28"/>
    <g transform="rotate(-34 135 155)">
      <polygon points="72,130 98,110 98,173 72,153" fill="#f9e4a4" stroke="#a27118" stroke-width="6" stroke-linejoin="round"/>
      <polygon points="98,115 113,104 134,104 149,115 149,168 134,179 113,179 98,168" fill="url(#goldBody)" stroke="#a27118" stroke-width="6" stroke-linejoin="round"/>
      <rect x="149" y="118" width="88" height="46" rx="18" fill="url(#goldBody)" stroke="#a27118" stroke-width="6"/>
      <g stroke="#946617" stroke-width="4" class="thread">
        <line x1="164" y1="121" x2="164" y2="160"/>
        <line x1="177" y1="121" x2="177" y2="160"/>
        <line x1="190" y1="121" x2="190" y2="160"/>
        <line x1="203" y1="121" x2="203" y2="160"/>
        <line x1="216" y1="121" x2="216" y2="160"/>
      </g>
      <path d="M102 120 C118 113 130 112 143 114" stroke="rgba(255,255,255,.5)" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    </g>
    <g transform="rotate(22 176 126)">
      <polygon points="124,84 154,64 198,80 212,117 182,147 138,131" fill="url(#steelDark)" stroke="#5d6871" stroke-width="7" stroke-linejoin="round"/>
      <polygon points="150,91 167,80 182,86 188,108 171,119 156,113" fill="#fffdf9" stroke="#7a8790" stroke-width="4.5" stroke-linejoin="round"/>
      <path d="M132 93 L202 100" class="facet-line"/>
      <path d="M144 129 L194 113" class="facet-line"/>
    </g>
    <g transform="translate(92 116)">
      <ellipse cx="0" cy="0" rx="26" ry="10" fill="#d1d7dc" opacity=".9"/>
      <ellipse cx="0" cy="0" rx="13" ry="5.5" fill="#fbfdff"/>
    </g>
    <text class="label" x="28" y="264">B. Crossed Workshop Parts</text>
    <text class="note" x="28" y="294">Most lively and closest to a toolbox vibe.</text>
  </g>

  <!-- Variant C -->
  <g transform="translate(720 180)">
    <rect class="tile" width="300" height="320" rx="24"/>
    <ellipse class="shadow" cx="150" cy="186" rx="96" ry="28"/>
    <g transform="rotate(-12 158 168)">
      <polygon points="82,170 105,152 105,208 82,190" fill="#f0ab90" stroke="#8f3a28" stroke-width="6" stroke-linejoin="round"/>
      <polygon points="105,158 119,147 139,147 153,158 153,202 139,213 119,213 105,202" fill="url(#redBody)" stroke="#8f3a28" stroke-width="6" stroke-linejoin="round"/>
      <rect x="153" y="162" width="110" height="36" rx="16" fill="url(#redBody)" stroke="#8f3a28" stroke-width="6"/>
      <g stroke="#883524" stroke-width="4" class="thread">
        <line x1="173" y1="164" x2="173" y2="195"/>
        <line x1="186" y1="164" x2="186" y2="195"/>
        <line x1="199" y1="164" x2="199" y2="195"/>
        <line x1="212" y1="164" x2="212" y2="195"/>
        <line x1="225" y1="164" x2="225" y2="195"/>
        <line x1="238" y1="164" x2="238" y2="195"/>
      </g>
      <path d="M110 162 C126 156 137 156 149 158" stroke="rgba(255,255,255,.5)" stroke-width="4.5" fill="none" stroke-linecap="round"/>
      <path d="M160 168 C190 161 223 161 249 168" stroke="rgba(255,255,255,.35)" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    </g>
    <g transform="translate(80 92)">
      <polygon points="0,52 29,10 90,10 119,52 90,94 29,94" fill="url(#steelLight)" stroke="#5c6871" stroke-width="8" stroke-linejoin="round"/>
      <polygon points="36,52 51,29 68,29 83,52 68,75 51,75" fill="#fffdf9" stroke="#7a8790" stroke-width="5" stroke-linejoin="round"/>
      <path d="M11 24 L108 24" class="facet-line"/>
      <path d="M11 80 L108 80" class="facet-line"/>
      <path d="M28 10 L52 52 L28 94" class="facet-line"/>
      <path d="M91 10 L67 52 L91 94" class="facet-line"/>
    </g>
    <text class="label" x="28" y="264">C. Oversize Hex Nut</text>
    <text class="note" x="28" y="294">Boldest and easiest to recognize fast.</text>
  </g>

  <!-- Variant D -->
  <g transform="translate(1050 180)">
    <rect class="tile" width="300" height="320" rx="24"/>
    <ellipse class="shadow" cx="150" cy="190" rx="96" ry="28"/>
    <g transform="rotate(-28 136 166)">
      <polygon points="76,148 102,130 102,189 76,171" fill="#b1dfaa" stroke="#34652e" stroke-width="6" stroke-linejoin="round"/>
      <polygon points="102,136 118,124 140,124 156,136 156,184 140,196 118,196 102,184" fill="url(#greenBody)" stroke="#34652e" stroke-width="6" stroke-linejoin="round"/>
      <rect x="156" y="140" width="100" height="40" rx="18" fill="url(#greenBody)" stroke="#34652e" stroke-width="6"/>
      <g stroke="#2d5928" stroke-width="4" class="thread">
        <line x1="173" y1="143" x2="173" y2="177"/>
        <line x1="187" y1="143" x2="187" y2="177"/>
        <line x1="201" y1="143" x2="201" y2="177"/>
        <line x1="215" y1="143" x2="215" y2="177"/>
        <line x1="229" y1="143" x2="229" y2="177"/>
      </g>
      <path d="M108 140 C123 133 137 132 150 135" stroke="rgba(255,255,255,.45)" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    </g>
    <g transform="translate(160 102)">
      <polygon points="0,32 18,2 56,2 74,32 56,62 18,62" fill="url(#steelLight)" stroke="#5d6871" stroke-width="6" stroke-linejoin="round"/>
      <polygon points="23,32 33,16 41,16 51,32 41,48 33,48" fill="#fffdf9" stroke="#7a8790" stroke-width="4" stroke-linejoin="round"/>
      <path d="M7 15 L67 15" class="facet-line"/>
      <path d="M7 49 L67 49" class="facet-line"/>
    </g>
    <g transform="translate(95 84)">
      <polygon points="0,28 18,0 54,0 72,28 54,56 18,56" fill="url(#steelDark)" stroke="#5d6871" stroke-width="6" stroke-linejoin="round"/>
      <polygon points="23,28 33,12 39,12 49,28 39,44 33,44" fill="#fffdf9" stroke="#7a8790" stroke-width="4" stroke-linejoin="round"/>
      <path d="M8 14 L64 14" class="facet-line"/>
      <path d="M8 42 L64 42" class="facet-line"/>
    </g>
    <g transform="translate(220 148)">
      <ellipse cx="0" cy="0" rx="18" ry="7" fill="#d3d8dd"/>
      <ellipse cx="0" cy="0" rx="9" ry="3.8" fill="#fbfdff"/>
    </g>
    <text class="label" x="28" y="264">D. Parts Pile</text>
    <text class="note" x="28" y="294">Feels most like assorted stored parts.</text>
  </g>

  <text class="subtitle" x="60" y="572">If you want the strongest “old app but nicer” direction, A and B are the best starting points for a final dashboard icon.</text>
</svg>
